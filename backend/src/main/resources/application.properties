# ============================================================
#                   APPLICATION PROPERTIES
#                   Configuration Supabase
# ============================================================

# ============================================================
# 1. CONNEXION À LA BASE DE DONNÉES SUPABASE
# ============================================================

# URL de connexion JDBC (format PostgreSQL)
spring.datasource.url=jdbc:postgresql://db.cyjkygaevdcippenlfed.supabase.co:5432/postgres?ssl=true&sslmode=require

# Identifiants de connexion
spring.datasource.username=postgres
spring.datasource.password=VOTRE_MOT_DE_PASSE_SUPABASE

# ============================================================
# 2. POOL DE CONNEXIONS (HikariCP)
# ============================================================

# Taille maximale du pool de connexions
spring.datasource.hikari.maximum-pool-size=10

# Temps d'attente maximum pour obtenir une connexion (ms)
spring.datasource.hikari.connection-timeout=30000

# Temps d'inactivité avant fermeture d'une connexion (ms)
spring.datasource.hikari.idle-timeout=600000

# Durée de vie maximum d'une connexion (ms)
spring.datasource.hikari.max-lifetime=1800000

# Nom du pool
spring.datasource.hikari.pool-name=SupabaseHikariPool

# Vérification de la connexion
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================================
# 3. CONFIGURATION JPA/HIBERNATE
# ============================================================

# Type de base de données
spring.jpa.database=POSTGRESQL

# Dialecte Hibernate pour PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Stratégie DDL (validate = ne modifie pas la base, vérifie juste)
spring.jpa.hibernate.ddl-auto=validate

# Afficher les requêtes SQL dans la console
spring.jpa.show-sql=true

# Formater les requêtes SQL pour meilleure lisibilité
spring.jpa.properties.hibernate.format_sql=true

# Utiliser les commentaires SQL
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================================
# 4. LOGGING HIBERNATE (Détails des requêtes)
# ============================================================

# Afficher les requêtes SQL
logging.level.org.hibernate.SQL=DEBUG

# Afficher les paramètres des requêtes SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Afficher les statistiques Hibernate
logging.level.org.hibernate.stat=DEBUG

# Désactiver les logs trop verbaux
logging.level.org.hibernate.engine.internal=WARN
logging.level.org.hibernate.internal=WARN

# ============================================================
# 5. CONFIGURATION SPRING
# ============================================================

# Nom de l'application
spring.application.name=travel-app

# Profil actif (dev, test, prod)
spring.profiles.active=dev

# ============================================================
# 6. CONFIGURATION JACKSON (Sérialisation JSON)
# ============================================================

# Format des dates
spring.jackson.serialization.write-dates-as-timestamps=false

# Fuseau horaire
spring.jackson.time-zone=Europe/Paris

# Gérer les propriétés null
spring.jackson.default-property-inclusion=non_null

# ============================================================
# 7. CONFIGURATION SUPABASE API (Optionnel)
# ============================================================

# URL de l'API Supabase (pour les appels REST supplémentaires)
supabase.url=https://cyjkygaevdcippenlfed.supabase.co

# Clé anonyme (pour les appels côté client)
supabase.key=VOTRE_CLE_ANON_SUPABASE

# Clé de service (pour les appels côté serveur - À garder SECRÈTE !)
supabase.service-key=VOTRE_CLE_SERVICE_SUPABASE

# ============================================================
# 8. CONFIGURATION DES FICHIERS UPLOADÉS
# ============================================================

# Dossier de stockage des uploads
app.upload.dir=uploads/

# Taille maximale des fichiers (multipart)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ============================================================
# 9. CONFIGURATION LOGGING GÉNÉRAL
# ============================================================

# Niveau de log pour l'application
logging.level.com.example.demo=DEBUG

# Niveau de log pour Spring Web
logging.level.org.springframework.web=INFO

# Niveau de log pour Spring Security
logging.level.org.springframework.security=INFO

# Niveau de log pour les transactions
logging.level.org.springframework.transaction=DEBUG

# ============================================================
# 10. CONFIGURATION ACTUATOR (Monitoring)
# ============================================================

# Activer les endpoints Actuator
management.endpoints.web.exposure.include=health,info,metrics,env

# Afficher les détails de santé
management.endpoint.health.show-details=always

# ============================================================
# 11. CONFIGURATION SECURITY (JWT)
# ============================================================

# Secret JWT (à remplacer par un secret fort)
app.jwt.secret=MON_SECRET_JWT_ULTRA_SECURISE_A_CHANGER

# Durée d'expiration du JWT (ms) - 24 heures
app.jwt.expiration.ms=86400000

# ============================================================
# 12. CONFIGURATION CORS
# ============================================================

# Origines autorisées (séparées par des virgules)
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,https://monapp.com

# Méthodes autorisées
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# ============================================================
# 13. CONFIGURATION DES EMAILS (Optionnel)
# ============================================================

# SMTP Configuration (exemple avec SendGrid)
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=VOTRE_CLE_SENDGRID
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# 14. CONFIGURATION DE PERFORMANCE
# ============================================================

# Batch size pour les requêtes JPA
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Order updates pour optimiser les batchs
spring.jpa.properties.hibernate.order_updates=true

# Order inserts pour optimiser les batchs
spring.jpa.properties.hibernate.order_inserts=true

# ============================================================
# 15. CONFIGURATION DE CACHE
# ============================================================

# Activer le cache
spring.cache.type=simple

# Cache des requêtes (pour les entités souvent demandées)
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true

# ============================================================
# 16. CONFIGURATION DE DEV (Profil spécifique)
# ============================================================

# Désactiver la sécurité CSRF en dev
spring.security.csrf.enabled=false

# Afficher plus de détails d'erreur
server.error.include-stacktrace=always
server.error.include-message=always

# ============================================================
# 17. CONFIGURATION DU SERVEUR
# ============================================================

# Port du serveur
server.port=8080

# Context path
server.servlet.context-path=/

# Compression des réponses
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ============================================================
# 18. FALLBACK / VALEURS PAR DÉFAUT (Avec variables d'environnement)
# ============================================================

# Utiliser les variables d'environnement si disponibles
# spring.datasource.url=${SUPABASE_URL:jdbc:postgresql://localhost:5432/default}
# spring.datasource.username=${SUPABASE_USERNAME:postgres}
# spring.datasource.password=${SUPABASE_PASSWORD:}