<main class="player-page" [style.--still-image]="stillImage">
  <header class="player-topbar">
    <app-logo [compact]="true"></app-logo>
  </header>

  <section class="fake-player" aria-label="Lecteur video de demonstration">
    <div class="player-shine"></div>
    <button
      class="player-center-button"
      [attr.aria-label]="playing() ? 'Mettre en pause' : 'Lancer la lecture'"
      type="button"
      (click)="togglePlayback()"
    >
      @if (playing()) {
        <span class="control-icon control-icon--pause" aria-hidden="true"></span>
      } @else {
        <span class="control-icon control-icon--play" aria-hidden="true"></span>
      }
    </button>
  </section>

  <footer class="player-controls">
    <div class="player-title">
      <span>{{ travel.title }}</span>
      <strong>{{ episode.title }}</strong>
    </div>

    <button
      class="round-control"
      [attr.aria-label]="playing() ? 'Mettre en pause' : 'Lancer la lecture'"
      type="button"
      (click)="togglePlayback()"
    >
      @if (playing()) {
        <span class="control-icon control-icon--pause" aria-hidden="true"></span>
      } @else {
        <span class="control-icon control-icon--play" aria-hidden="true"></span>
      }
    </button>

    <div class="player-progress" aria-label="Barre de progression">
      <span>{{ progress().toFixed(0) }}%</span>
      <div class="progress-track">
        <span [style.width.%]="progress()"></span>
      </div>
      <span>{{ episode.duration }}</span>
    </div>
  </footer>
</main>
